<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bionic Reader — Text-to-Speech with Bionic Reading</title>
    <meta name="description" content="A text-to-speech tool with GPT-powered bionic reading formatting.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0e0f13;
            --surface: #16171d;
            --surface-hover: #1e1f27;
            --border: #2a2b35;
            --text: #e4e4e8;
            --text-dim: #8b8c95;
            --accent: #7c6aef;
            --accent-glow: rgba(124, 106, 239, 0.25);
            --highlight: rgba(255, 210, 63, 0.2);
            --highlight-border: #ffd23f;
            --danger: #ef4444;
            --warning: #f59e0b;
            --success: #22c55e;
            --radius: 12px;
            --font-display: 'Outfit', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        html { font-size: 16px; }

        body {
            font-family: var(--font-display);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 9999;
        }

        .app {
            max-width: 820px;
            margin: 0 auto;
            padding: 2rem 1.25rem 4rem;
        }

        header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        header h1 {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            margin-bottom: 0.25rem;
        }

        header h1 span {
            background: linear-gradient(135deg, var(--accent), #a78bfa, #ffd23f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        header p {
            color: var(--text-dim);
            font-size: 0.9rem;
            font-weight: 300;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.5rem;
            margin-bottom: 1rem;
        }

        .card-label {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-dim);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .card-label::before {
            content: '';
            width: 6px;
            height: 6px;
            background: var(--accent);
            border-radius: 50%;
            display: inline-block;
        }

        .controls-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .controls-grid.three-col {
            grid-template-columns: 1fr 1fr 1fr;
        }

        @media (max-width: 640px) {
            .controls-grid, .controls-grid.three-col { grid-template-columns: 1fr; }
        }

        .control-group label {
            display: block;
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--text-dim);
            margin-bottom: 0.4rem;
        }

        select, input[type="password"], input[type="range"] {
            width: 100%;
            appearance: none;
            -webkit-appearance: none;
        }

        select, input[type="password"] {
            background: var(--bg);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.55rem 0.75rem;
            font-family: var(--font-display);
            font-size: 0.85rem;
            transition: border-color 0.2s;
        }

        select:focus, input[type="password"]:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        input[type="password"]::placeholder {
            color: var(--text-dim);
            opacity: 0.5;
        }

        input[type="range"] {
            height: 6px;
            background: var(--bg);
            border-radius: 3px;
            margin-top: 0.5rem;
            cursor: pointer;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            background: var(--accent);
            border-radius: 50%;
            border: 2px solid var(--surface);
            box-shadow: 0 0 0 3px var(--accent-glow);
            cursor: pointer;
        }

        input[type="range"]::-moz-range-thumb {
            width: 18px;
            height: 18px;
            background: var(--accent);
            border-radius: 50%;
            border: 2px solid var(--surface);
            cursor: pointer;
        }

        .speed-display {
            font-family: var(--font-mono);
            font-size: 0.8rem;
            color: var(--accent);
            margin-top: 0.3rem;
        }

        .mode-toggle {
            display: flex;
            gap: 0;
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            margin-top: 0.4rem;
        }

        .mode-toggle button {
            flex: 1;
            padding: 0.5rem 0.75rem;
            border: none;
            background: var(--bg);
            color: var(--text-dim);
            font-family: var(--font-display);
            font-size: 0.78rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .mode-toggle button.active {
            background: var(--accent);
            color: #fff;
        }

        .mode-toggle button:not(:last-child) {
            border-right: 1px solid var(--border);
        }

        textarea {
            width: 100%;
            min-height: 180px;
            max-height: 350px;
            background: var(--bg);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1rem;
            font-family: var(--font-display);
            font-size: 0.95rem;
            line-height: 1.7;
            resize: vertical;
            transition: border-color 0.2s;
        }

        textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        textarea::placeholder {
            color: var(--text-dim);
            opacity: 0.6;
        }

        .bionic-display {
            min-height: 100px;
            max-height: 350px;
            overflow-y: auto;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1rem;
            font-size: 1rem;
            line-height: 1.85;
            margin-top: 1rem;
            display: none;
        }

        .bionic-display.visible { display: block; }

        .bionic-display::-webkit-scrollbar { width: 6px; }
        .bionic-display::-webkit-scrollbar-track { background: transparent; }
        .bionic-display::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        .bionic-bold { font-weight: 700; color: #fff; }

        .word-span { transition: background-color 0.15s; border-radius: 3px; padding: 1px 2px; }
        .word-span.active {
            background: var(--highlight);
            box-shadow: 0 0 0 1px var(--highlight-border);
        }

        .btn-row {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.6rem 1.2rem;
            border: none;
            border-radius: 8px;
            font-family: var(--font-display);
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn svg { width: 16px; height: 16px; }

        .btn-primary {
            background: var(--accent);
            color: #fff;
            box-shadow: 0 2px 12px var(--accent-glow);
        }
        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 20px var(--accent-glow);
        }
        .btn-primary:active { transform: translateY(0); }

        .btn-secondary {
            background: var(--surface-hover);
            color: var(--text-dim);
            border: 1px solid var(--border);
        }
        .btn-secondary:hover { color: var(--text); border-color: var(--text-dim); }

        .btn-danger {
            background: transparent;
            color: var(--danger);
            border: 1px solid rgba(239, 68, 68, 0.3);
        }
        .btn-danger:hover { background: rgba(239, 68, 68, 0.1); }

        .btn:disabled {
            opacity: 0.4;
            pointer-events: none;
        }

        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .current-word {
            text-align: center;
            padding: 1.5rem;
            font-size: 2.5rem;
            font-weight: 300;
            letter-spacing: 0.05em;
            min-height: 5rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .current-word .bionic-bold { font-weight: 700; }

        .status-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.6rem 0;
            font-size: 0.75rem;
            color: var(--text-dim);
        }

        .status-indicator {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
        }

        .status-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--text-dim);
        }

        .status-dot.ready { background: var(--success); }
        .status-dot.playing { background: var(--warning); animation: pulse 1.2s infinite; }
        .status-dot.paused { background: var(--warning); }
        .status-dot.loading { background: var(--accent); animation: pulse 0.6s infinite; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--danger);
            color: #fff;
            padding: 0.75rem 1.25rem;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 500;
            z-index: 10000;
            opacity: 0;
            transition: all 0.3s;
            max-width: 90%;
            text-align: center;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        footer {
            text-align: center;
            margin-top: 3rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border);
            color: var(--text-dim);
            font-size: 0.75rem;
        }

        footer a {
            color: var(--accent);
            text-decoration: none;
        }

        footer a:hover { text-decoration: underline; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card { animation: fadeIn 0.4s ease both; }
        .card:nth-child(2) { animation-delay: 0.05s; }
        .card:nth-child(3) { animation-delay: 0.1s; }
        .card:nth-child(4) { animation-delay: 0.15s; }
    </style>
</head>
<body>
    <div class="app">
        <header>
            <h1><span>Bionic Reader</span></h1>
            <p>GPT-powered bionic reading with text-to-speech</p>
        </header>

        <div class="card">
            <div class="card-label">Settings</div>
            <div class="controls-grid three-col">
                <div class="control-group">
                    <label for="apiKey">OpenAI API Key</label>
                    <input type="password" id="apiKey" placeholder="sk-...">
                </div>
                <div class="control-group">
                    <label for="voiceSelect">Voice</label>
                    <select id="voiceSelect"></select>
                </div>
                <div class="control-group">
                    <label for="voiceSpeed">Speed</label>
                    <input type="range" id="voiceSpeed" min="0.5" max="2" step="0.1" value="1">
                    <div class="speed-display" id="speedValue">1.0×</div>
                </div>
            </div>
            <div class="control-group" style="margin-top: 1rem;">
                <label>Bionic Mode</label>
                <div class="mode-toggle">
                    <button class="active" data-mode="gpt" onclick="setMode('gpt')">GPT (API)</button>
                    <button data-mode="local" onclick="setMode('local')">Local (Free)</button>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-label">Input Text</div>
            <textarea id="input-text" placeholder="Paste or type your text here..."></textarea>
            <div id="bionic-display" class="bionic-display"></div>
            <div class="btn-row">
                <button class="btn btn-primary" id="btn-play" onclick="processAndRead()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                    Play
                </button>
                <button class="btn btn-secondary" id="btn-pause" onclick="pauseReading()" disabled>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
                    Pause
                </button>
                <button class="btn btn-danger" id="btn-stop" onclick="stopReading()" disabled>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/></svg>
                    Stop
                </button>
            </div>
        </div>

        <div class="card">
            <div class="card-label">Now Reading</div>
            <div class="current-word" id="current-word-display"></div>
            <div class="status-bar">
                <div class="status-indicator">
                    <div class="status-dot" id="status-dot"></div>
                    <span id="status-text">Ready</span>
                </div>
                <span id="word-counter"></span>
            </div>
        </div>

        <footer>
            Built with OpenAI API &amp; Web Speech API — <a href="https://github.com/" target="_blank">View on GitHub</a>
        </footer>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // ── State ──
        let utterance = null;
        let wordIndex = 0;
        let isPaused = false;
        let totalWords = 0;
        let bionicMode = 'gpt';

        // ── DOM ──
        const $ = (id) => document.getElementById(id);
        const inputText     = $('input-text');
        const bionicDisplay = $('bionic-display');
        const wordDisplay   = $('current-word-display');
        const statusDot     = $('status-dot');
        const statusText    = $('status-text');
        const wordCounter   = $('word-counter');
        const btnPlay       = $('btn-play');
        const btnPause      = $('btn-pause');
        const btnStop       = $('btn-stop');

        // ── Persist API key ──
        const savedKey = localStorage.getItem('openai_api_key');
        if (savedKey) $('apiKey').value = savedKey;
        $('apiKey').addEventListener('change', (e) => {
            localStorage.setItem('openai_api_key', e.target.value);
        });

        // ── Voices ──
        function loadVoices() {
            const select = $('voiceSelect');
            const voices = speechSynthesis.getVoices();
            select.innerHTML = '';
            voices.forEach(voice => {
                const opt = document.createElement('option');
                opt.value = voice.name;
                opt.textContent = `${voice.name} (${voice.lang})`;
                if (voice.default) opt.selected = true;
                select.appendChild(opt);
            });
        }
        speechSynthesis.onvoiceschanged = loadVoices;
        loadVoices();

        $('voiceSpeed').addEventListener('input', (e) => {
            $('speedValue').textContent = `${parseFloat(e.target.value).toFixed(1)}×`;
        });

        // ── Mode ──
        function setMode(mode) {
            bionicMode = mode;
            document.querySelectorAll('.mode-toggle button').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.mode === mode);
            });
        }

        // ── Toast ──
        function showToast(msg, duration = 3500) {
            const toast = $('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), duration);
        }

        // ── Util ──
        function escapeHtml(str) {
            const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
            return str.replace(/[&<>"']/g, c => map[c]);
        }

        // ── Bionic: Local ──
        function toBionicLocal(text) {
            return text.split(/(\s+)/).map(token => {
                if (/^\s+$/.test(token)) return token;
                const half = Math.ceil(token.length / 2);
                return `<span class="word-span"><span class="bionic-bold">${escapeHtml(token.slice(0, half))}</span>${escapeHtml(token.slice(half))}</span>`;
            }).join('');
        }

        // ── Bionic: GPT ──
        async function toBionicGPT(text) {
            const apiKey = $('apiKey').value.trim();
            if (!apiKey) {
                showToast('Please enter your OpenAI API key');
                return null;
            }

            setStatus('loading', 'Calling GPT...');

            try {
                const response = await fetch('https://api.openai.com/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: 'gpt-4o-mini',
                        messages: [
                            {
                                role: 'system',
                                content: `You are a text formatter. Convert the user's text to bionic reading format.
Return ONLY raw HTML — no markdown, no code fences, no explanations.
Rules:
- Wrap each word in: <span class="word-span"><strong>firstHalf</strong>secondHalf</span>
- "firstHalf" = first ceil(length/2) characters of the word
- Preserve all original whitespace and line breaks between words
- Do NOT add any wrapper tags, paragraphs, or extra markup`
                            },
                            { role: 'user', content: text }
                        ],
                        temperature: 0.1
                    })
                });

                if (!response.ok) {
                    const err = await response.json().catch(() => ({}));
                    throw new Error(err.error?.message || `API Error ${response.status}`);
                }

                const data = await response.json();
                let html = data.choices[0].message.content;
                // Strip markdown code fences if GPT added them
                html = html.replace(/^```html?\s*/i, '').replace(/\s*```$/i, '').trim();
                return html;
            } catch (error) {
                console.error('GPT Error:', error);
                showToast(error.message);
                setStatus('ready', 'Error');
                return null;
            }
        }

        // Ensure GPT output has word-span wrappers for highlighting
        function ensureWordSpans(html) {
            if (html.includes('word-span')) return html;
            const div = document.createElement('div');
            div.innerHTML = html;
            return toBionicLocal(div.textContent);
        }

        // ── Status ──
        function setStatus(state, text) {
            statusDot.className = 'status-dot ' + state;
            statusText.textContent = text;
        }

        function setButtons(playing) {
            btnPlay.disabled = playing && !isPaused;
            btnPause.disabled = !playing;
            btnStop.disabled = !playing;
            if (isPaused) {
                btnPlay.disabled = false;
                btnPlay.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg> Resume`;
            } else {
                btnPlay.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg> Play`;
            }
        }

        function setPlayLoading(loading) {
            if (loading) {
                btnPlay.disabled = true;
                btnPlay.innerHTML = `<span class="spinner"></span> Processing...`;
            }
        }

        // ── Core ──
        async function processAndRead() {
            if (isPaused) {
                speechSynthesis.resume();
                isPaused = false;
                setStatus('playing', 'Playing');
                setButtons(true);
                return;
            }

            const text = inputText.value.trim();
            if (!text) {
                showToast('Please enter some text first');
                return;
            }

            setPlayLoading(true);

            let bionicHTML;
            if (bionicMode === 'gpt') {
                bionicHTML = await toBionicGPT(text);
                if (!bionicHTML) { setButtons(false); return; }
                bionicHTML = ensureWordSpans(bionicHTML);
            } else {
                bionicHTML = toBionicLocal(text);
            }

            bionicDisplay.innerHTML = bionicHTML;
            bionicDisplay.classList.add('visible');

            wordIndex = 0;
            const words = text.split(/\s+/);
            totalWords = words.length;

            utterance = new SpeechSynthesisUtterance(text);
            utterance.rate = parseFloat($('voiceSpeed').value);

            const selectedVoice = $('voiceSelect').value;
            const voice = speechSynthesis.getVoices().find(v => v.name === selectedVoice);
            if (voice) utterance.voice = voice;

            utterance.onboundary = (event) => {
                if (event.name === 'word' && wordIndex < words.length) {
                    highlightWord(words[wordIndex], wordIndex);
                    wordIndex++;
                    wordCounter.textContent = `${wordIndex} / ${totalWords}`;
                }
            };

            utterance.onend = () => {
                resetUI();
                setStatus('ready', 'Done');
                wordCounter.textContent = `${totalWords} / ${totalWords}`;
            };

            utterance.onerror = () => {
                resetUI();
                setStatus('ready', 'Error');
            };

            speechSynthesis.speak(utterance);
            setStatus('playing', 'Playing');
            setButtons(true);
        }

        function pauseReading() {
            speechSynthesis.pause();
            isPaused = true;
            setStatus('paused', 'Paused');
            setButtons(true);
        }

        function stopReading() {
            speechSynthesis.cancel();
            isPaused = false;
            resetUI();
            setStatus('ready', 'Stopped');
        }

        function resetUI() {
            wordDisplay.innerHTML = '';
            clearHighlights();
            isPaused = false;
            setButtons(false);
        }

        // ── Highlight ──
        function highlightWord(word, index) {
            const half = Math.ceil(word.length / 2);
            wordDisplay.innerHTML = `<span class="bionic-bold">${escapeHtml(word.slice(0, half))}</span>${escapeHtml(word.slice(half))}`;
            clearHighlights();
            const spans = bionicDisplay.querySelectorAll('.word-span');
            if (index < spans.length) {
                spans[index].classList.add('active');
                spans[index].scrollIntoView({ block: 'nearest', behavior: 'smooth' });
            }
        }

        function clearHighlights() {
            bionicDisplay.querySelectorAll('.word-span.active').forEach(el => el.classList.remove('active'));
        }
    </script>
</body>
</html>
